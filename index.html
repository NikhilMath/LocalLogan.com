<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script>
    $(function () {
      $("#products h2.product-name[data-type='mineralwater']").css("background-color", "#2982D0");
      $("#products h2.product-name[data-type='vitamin']").css("background-color", "#12500F");
      $("#products h2.product-name[data-type='proteinbar']").css("background-color", "#4E0F50");

      document.querySelector('#cbsitdown').addEventListener('change', function (evt) {
        updateProductView("sitdown", evt.target.checked);
      });
      document.querySelector('#cbmexican').addEventListener('change', function (evt) {
        updateProductView("mexican", evt.target.checked);
      });
      document.querySelector('#cbsushi').addEventListener('change', function (evt) {
        updateProductView("sushi", evt.target.checked);
      });

      $(".product-item").each(function () {
        var prodName = encodeURIComponent($(this).children("h2").text());
        var prodID = encodeURIComponent($(this).data("prod_id"));

        var link = $("<a href='product.html?prodName=" + prodName + "&prodID=" + prodID + "'/>");
        $(this).children("img").wrap(link);
      })

    })

    function updateProductView(categoryName, bVisible) {
      // get a list of the product items for the given category.
      // Use the data attributes to narrow the list
      var dataSelectorVal = "";
      switch (categoryName) {
        case "sitdown":
          dataSelectorVal = "h2[data-type='sitdown']";
          break;
        case "mexican":
          dataSelectorVal = "h2[data-type='mexican']";
          break;
        case "sushi":
          dataSelectorVal = "h2[data-type='sushi']";
          break;
      }
      // use the has() function to select the li tags that are product items
      // that contain the h2 tag with the corresponding data attribute value
      $(".product-item").has(dataSelectorVal).css('display', bVisible ? "" : "none");
    }
  </script>
  <title>Local Logan</title>
</head>

<body>
  <h1>Local Logan</h1>


  <form>
    <div>
      <span>Show: </span>
      <input id="cbsitdown" type="checkbox" checked="checked" />
      <label for="cbsitdown">sitdown </label>
      <input id="cbmexican" type="checkbox" checked="checked" />
      <label for="cbmexican">mecian Water </label>
      <input id="cbsushi" type="checkbox" checked="checked" />
      <label for="cbsushi">sushi Bars </label>
    </div>
  </form>
